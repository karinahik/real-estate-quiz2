<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Подбор недвижимости</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:#f5f5f5;
}

.container{
  max-width:420px;
  margin:auto;
  padding:20px;
}

h1{
  font-size:20px;
  margin-bottom:15px;
}

.block{
  margin-bottom:25px;
}

.options{
  display:flex;
  gap:10px;
}

.option{
  flex:1;
  padding:14px;
  border-radius:14px;
  background:#eaeaea;
  text-align:center;
  cursor:pointer;
}

.option.active{
  background:#ffd233;
}

input{
  width:100%;
  padding:15px;
  border-radius:14px;
  border:none;
  margin-top:10px;
  font-size:16px;
  box-sizing:border-box;
}

.radio{
  display:flex;
  align-items:center;
  margin-top:10px;
  cursor:pointer;
}

.radio input{
  display:none;
}

.circle{
  width:18px;
  height:18px;
  border:2px solid #aaa;
  border-radius:50%;
  margin-right:10px;
  position:relative;
}

.radio input:checked + .circle::after{
  content:'';
  width:10px;
  height:10px;
  background:#ffd233;
  border-radius:50%;
  position:absolute;
  top:2px;
  left:2px;
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  background:#ffd233;
  font-size:16px;
  margin-top:20px;
  cursor:pointer;
}

.final{
  display:none;
  text-align:center;
}

img{
  width:100%;
  border-radius:20px;
  margin-bottom:20px;
}
</style>

</head>

<body>

<div class="container" id="form">

<!-- ГОРОД -->
<div class="block">
<h1>Где хотите купить квартиру?</h1>
<div class="options">
<div class="option" onclick="select(this,'city','Петербург')">Петербург</div>
<div class="option" onclick="select(this,'city','Москва')">Москва</div>
<div class="option" onclick="select(this,'city','Дубай')">Дубай/ОАЭ</div>
</div>
</div>

<!-- ИМЯ -->
<div class="block">
<h1>Ваше имя</h1>
<input type="text" id="name" placeholder="Введите ваше имя">
</div>

<!-- ТЕЛЕФОН -->
<div class="block">
<h1>Номер телефона</h1>
<input type="tel" id="phone" value="+7">
</div>

<!-- БЮДЖЕТ -->
<div class="block">
<h1>Планируемый бюджет:</h1>

<label class="radio">
<input type="radio" name="budget" value="до 10 млн">
<div class="circle"></div>
<span>Меньше 10 млн рублей</span>
</label>

<label class="radio">
<input type="radio" name="budget" value="10-15 млн">
<div class="circle"></div>
<span>10-15 млн рублей</span>
</label>

<label class="radio">
<input type="radio" name="budget" value="15+ млн">
<div class="circle"></div>
<span>Больше 15 млн рублей</span>
</label>

</div>

<!-- СРОК -->
<div class="block">
<h1>Как скоро?</h1>

<label class="radio">
<input type="radio" name="time" value="срочно">
<div class="circle"></div>
<span>Как можно скорее</span>
</label>

<label class="radio">
<input type="radio" name="time" value="2-3 месяца">
<div class="circle"></div>
<span>В ближайшие 2-3 месяца</span>
</label>

<label class="radio">
<input type="radio" name="time" value="позже">
<div class="circle"></div>
<span>Через 3 месяца и позже</span>
</label>

</div>

<button onclick="send()">Отправить</button>

</div>

<!-- ФИНАЛ -->
<div class="container final" id="final">

<img src="photo.jpg">

<h1>Спасибо за заявку</h1>

<p>
Мы уже изучаем ваш запрос и скоро позвоним и напишем вам.<br><br>
А пока подпишитесь на мой Telegram-канал с квартирами и акциями
</p>

<button onclick="goTG()">Перейти в Telegram</button>

</div>

<script>

let data = {};

function select(el, key, value){
  document.querySelectorAll(`[onclick*="${key}"]`).forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  data[key] = value;
}

function send(){

  const name = document.getElementById('name').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const budget = document.querySelector('input[name="budget"]:checked');
  const time = document.querySelector('input[name="time"]:checked');

  if(!data.city || !name || !phone || !budget || !time){
    alert("Заполните все поля");
    return;
  }

  const formData = new FormData();
  formData.append("city", data.city);
  formData.append("name", name);
  formData.append("phone", phone);
  formData.append("budget", budget.value);
  formData.append("time", time.value);

  fetch("https://formspree.io/f/mnjolzzv", {
    method:"POST",
    body:formData,
    headers:{'Accept':'application/json'}
  })
  .then(res=>{
    if(res.ok){
      document.getElementById('form').style.display="none";
      document.getElementById('final').style.display="block";
    } else {
      alert("Ошибка. Попробуйте выключить VPN и обновить страницу");
    }
  })
  .catch(()=>{
    alert("Ошибка сети. Попробуйте позже");
  });

}

function goTG(){
  window.location.href="https://t.me/+_stlczeu_l0zMDIy";
}

</script>

</body>
</html>
