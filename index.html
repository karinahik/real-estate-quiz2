<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Подбор недвижимости</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:#f5f5f5;
}

.container{
  max-width:420px;
  margin:auto;
  padding:20px;
}

h2{
  font-size:18px;
  margin:20px 0 10px;
}

.box{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.option{
  flex:1;
  padding:15px;
  border-radius:12px;
  background:#eee;
  text-align:center;
  cursor:pointer;
}

.option.active{
  background:#ffc928;
}

input{
  width:100%;
  padding:15px;
  border-radius:12px;
  border:none;
  margin-bottom:15px;
  font-size:16px;
}

.radio{
  margin-bottom:10px;
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  background:#ffc928;
  font-size:18px;
  margin-top:20px;
  cursor:pointer;
}

.success{
  display:none;
  text-align:center;
}

.success img{
  width:100%;
  border-radius:20px;
  margin-bottom:20px;
}
</style>

</head>

<body>

<div class="container">

<div id="form">

<h2>Где хотите купить квартиру?</h2>

<div class="box">
  <div class="option" onclick="selectCity(this,'СПБ')">Петербург</div>
  <div class="option" onclick="selectCity(this,'Москва')">Москва</div>
  <div class="option" onclick="selectCity(this,'Дубай')">Дубай/ОАЭ</div>
</div>

<h2>Ваше имя</h2>
<input type="text" id="name" placeholder="Введите ваше имя">

<h2>Номер телефона</h2>
<input type="tel" id="phone" value="+7 " oninput="fixPhone(this)">

<h2>Планируемый бюджет:</h2>
<div class="radio">
  <input type="radio" name="budget" value="до 10 млн"> До 10 млн
</div>
<div class="radio">
  <input type="radio" name="budget" value="10-15 млн"> 10-15 млн
</div>
<div class="radio">
  <input type="radio" name="budget" value="15+ млн"> Более 15 млн
</div>

<h2>Как скоро?</h2>
<div class="radio">
  <input type="radio" name="time" value="срочно"> Как можно скорее
</div>
<div class="radio">
  <input type="radio" name="time" value="2-3 месяца"> 2-3 месяца
</div>
<div class="radio">
  <input type="radio" name="time" value="позже"> Позже
</div>

<button onclick="send()">Отправить</button>

</div>

<!-- УСПЕХ -->
<div class="success" id="success">

<img src="photo.jpg">

<h2>Спасибо за заявку</h2>

<p>
Мы уже изучаем ваш запрос и скоро свяжемся с вами.<br><br>
Подпишитесь на Telegram канал:
</p>

<button onclick="goTG()">Перейти в Telegram</button>

</div>

</div>

<script>

let city = "";

function selectCity(el, value){
  city = value;

  document.querySelectorAll('.option').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
}

function fixPhone(input){
  if(!input.value.startsWith('+7')){
    input.value = '+7 ';
  }
}

function send(){

  const name = document.getElementById('name').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const budget = document.querySelector('input[name="budget"]:checked');
  const time = document.querySelector('input[name="time"]:checked');

  if(!city || !name || !phone || !budget || !time){
    alert("Заполните все поля");
    return;
  }

  const formData = new FormData();
  formData.append("city", city);
  formData.append("name", name);
  formData.append("phone", phone);
  formData.append("budget", budget.value);
  formData.append("time", time.value);

  fetch("https://formspree.io/f/mnjolzzv", {
    method:"POST",
    body:formData,
    headers:{'Accept':'application/json'}
  })
  .then(res=>{
    if(res.ok){
      document.getElementById('form').style.display="none";
      document.getElementById('success').style.display="block";
    } else {
      alert("Ошибка. Попробуйте без VPN");
    }
  })
  .catch(()=>{
    alert("Ошибка сети");
  });

}

function goTG(){
  window.location.href="https://t.me/+_stlczeu_l0zMDIy";
}

</script>

</body>
</html>
