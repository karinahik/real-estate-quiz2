<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Подбор недвижимости</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:#0e0e0e;
  color:#fff;
}

.container{
  max-width:420px;
  margin:auto;
  padding:20px;
}

.logo{
  font-weight:bold;
  margin-bottom:15px;
}

.progress{
  height:6px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
  margin-bottom:25px;
}

.progress-bar{
  height:100%;
  width:25%;
  background:#ff4d4d;
  transition:0.3s;
}

.step{
  display:none;
  animation:fade .3s;
}

.step.active{
  display:block;
}

@keyframes fade{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

h1{
  font-size:22px;
  margin-bottom:20px;
}

button{
  width:100%;
  padding:15px;
  margin-top:10px;
  border:none;
  border-radius:14px;
  background:#1c1c1c;
  color:#fff;
  font-size:16px;
}

button:hover{
  background:#2a2a2a;
}

.next{
  background:#ff4d4d;
}

input{
  width:100%;
  padding:15px;
  border-radius:14px;
  border:none;
  margin-top:10px;
  font-size:16px;
}

img{
  width:100%;
  border-radius:20px;
  margin-bottom:20px;
}
</style>

</head>

<body>

<div class="container">

<div class="logo">REAL ESTATE QUIZ</div>

<div class="progress">
  <div class="progress-bar" id="progress"></div>
</div>

<!-- ШАГ 1 -->
<div class="step active" id="step1">
<h1>Что вы ищете?</h1>
<button onclick="nextStep(2, 'Квартира')">Квартира</button>
<button onclick="nextStep(2, 'Дом')">Дом</button>
</div>

<!-- ШАГ 2 -->
<div class="step" id="step2">
<h1>Ваш бюджет</h1>
<button onclick="nextStep(3, 'до 5 млн')">до 5 млн</button>
<button onclick="nextStep(3, '5-10 млн')">5-10 млн</button>
<button onclick="nextStep(3, '10+ млн')">10+ млн</button>
</div>

<!-- ШАГ 3 -->
<div class="step" id="step3">
<h1>Введите имя</h1>
<input type="text" id="name" placeholder="Ваше имя">
<button class="next" onclick="sendForm()">Далее</button>
</div>

<!-- ФИНАЛ -->
<div class="step" id="step4">
<img src="photo.jpg">

<h1>Спасибо за заявку</h1>

<p>
Мы уже изучаем ваш запрос и скоро позвоним и напишем вам.<br><br>
А пока подпишитесь на мой Telegram-канал с квартирами и акциями
</p>

<button class="next" onclick="goTG()">Перейти в Telegram</button>
</div>

</div>

<script>

let data = {};
let progress = 25;

function nextStep(step, value){
  data['answer'] = value;

  document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
  document.getElementById('step' + step).classList.add('active');

  progress += 25;
  document.getElementById('progress').style.width = progress + "%";
}

function sendForm(){
  const name = document.getElementById('name').value.trim();

  if(!name){
    alert("Введите имя");
    return;
  }

  const formData = new FormData();
  formData.append("name", name);
  formData.append("answer", data.answer);

  fetch("https://formspree.io/f/mnjolzzv", {
    method: "POST",
    body: formData,
    headers: { 'Accept': 'application/json' }
  })
  .then(function(res){
    if(res.ok){
      nextStep(4);
    } else {
      alert("Ошибка. Попробуйте без VPN");
    }
  })
  .catch(function(){
    alert("Ошибка сети. Попробуйте позже");
  });
}

function goTG(){
  window.location.href = "https://t.me/+_stlczeu_l0zMDIy";
}

</script>

</body>
</html>
